name: Build Reynard Browser (TrollStore TIPA)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-ios-trollstore:
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Xcode 26.5
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.5'

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Rust
        run: rustup update stable

      - name: Install dependencies (ldid, lld)
        run: brew install ldid lld

      - name: Download Gecko and apply patches
        run: |
          chmod +x ./tools/development/update-gecko.sh
          chmod +x ./tools/development/apply-patches.sh
          ./tools/development/update-gecko.sh
          ./tools/development/apply-patches.sh

      - name: Build dependencies and the Gecko engine
        run: |
          # Force the runner to prioritize the LLVM linker over Apple's default
          export PATH="$(brew --prefix lld)/bin:$PATH"
          
          chmod +x ./tools/development/build-idevice.sh
          chmod +x ./tools/development/build-gecko.sh
          ./tools/development/build-idevice.sh
          ./tools/development/build-gecko.sh
      - name: Build Xcode Project (Unsigned)
        run: |
          xcodebuild clean build \
            -project Reynard.xcodeproj \
            -scheme Reynard \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=${PWD}/build_output

      - name: Sign with Scraped Entitlements and Package TIPA
        run: |
          # Inject the exact working entitlements file from your repo root
          ldid -Strollstore.entitlements build_output/Reynard.app
          
          # Package into the required Payload folder structure
          mkdir Payload
          cp -r build_output/Reynard.app Payload/
          
          # Compress into the final .tipa
          zip -qr reynard-browser.tipa Payload
          
      - name: Upload TrollStore Artifact
        uses: actions/upload-artifact@v4
        with:
          name: reynard-trollstore-tipa
          path: reynard-browser.tipa
