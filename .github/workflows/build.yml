name: Build Reynard Browser (TrollStore TIPA)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-ios-trollstore:
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Xcode 26.5
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.5'

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Rust
        run: rustup update stable

      - name: Install dependencies (ldid, lld, cbindgen)
        run: brew install ldid lld cbindgen

      - name: Setup WASI SDK
        id: setup-wasi
        uses: bytecodealliance/setup-wasi-sdk-action@main
        with:
          version: '32'
          add-to-path: false

      - name: Download Gecko and apply patches
        run: |
          chmod +x ./tools/development/update-gecko.sh
          chmod +x ./tools/development/apply-patches.sh
          ./tools/development/update-gecko.sh
          ./tools/development/apply-patches.sh

      - name: Build dependencies and the Gecko engine
        run: |
          export PATH="$(brew --prefix lld)/bin:$PATH"
          export WASM_CC="${{ steps.setup-wasi.outputs.wasi-sdk-path }}/bin/clang"
          export WASM_CXX="${{ steps.setup-wasi.outputs.wasi-sdk-path }}/bin/clang++"
          
          chmod +x ./tools/development/build-idevice.sh
          chmod +x ./tools/development/build-gecko.sh
          ./tools/development/build-idevice.sh
          ./tools/development/build-gecko.sh

      - name: Generate Dummy Apple Certificate
        run: |
          # Create and unlock a temporary keychain for the runner
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH
          
          # Generate a self-signed certificate named exactly what Xcode is looking for
          openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem -days 365 -nodes -subj "/CN=Apple Development"
          openssl pkcs12 -export -out cert.p12 -inkey key.pem -in cert.pem -passout pass:
          
          # Import the dummy certificate into the keychain and grant codesign access
          security import cert.p12 -k $KEYCHAIN_PATH -P "" -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" $KEYCHAIN_PATH

      - name: Compile Xcode Project (Native Script)
        run: |
          chmod +x ./tools/release/build-app.sh
          
          # Completely disable code signing inside Xcode to bypass SDK restrictions
          echo "" >> browser/Configuration/Reynard.xcconfig
          echo "CODE_SIGNING_ALLOWED = NO" >> browser/Configuration/Reynard.xcconfig
          echo "CODE_SIGNING_REQUIRED = NO" >> browser/Configuration/Reynard.xcconfig
          echo "CODE_SIGN_IDENTITY = " >> browser/Configuration/Reynard.xcconfig
          echo "CODE_SIGN_STYLE = Manual" >> browser/Configuration/Reynard.xcconfig
          echo "PROVISIONING_PROFILE_SPECIFIER = " >> browser/Configuration/Reynard.xcconfig
          echo "DEVELOPMENT_TEAM = " >> browser/Configuration/Reynard.xcconfig
          
          ./tools/release/build-app.sh

      - name: Package TrollStore TIPA (Native Script)
        run: |
          chmod +x ./tools/release/package-app.sh
          ./tools/release/package-app.sh

      - name: Upload TrollStore Artifact
        uses: actions/upload-artifact@v4
        with:
          name: reynard-trollstore-tipa
          path: dist/Reynard-TrollStore.tipa
